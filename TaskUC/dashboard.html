<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskUC - Gestión de tareas</title>

    <link rel="stylesheet" href="css/dashboard.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <header>

        <h1>
            <i class="fa-solid fa-graduation-cap"></i>
            TaskUC
        </h1>

        <button id="logoutBtn">
            Cerrar Sesión
        </button>

    </header>

    <main>

        <section class="welcome-card">

            <h2 id="welcomeMessage">
                Bienvenido
            </h2>

            <p>
                Gestiona tus actividades académicas de manera eficiente.
            </p>

        </section>

        <section class="stats">

            <div class="card">
                <h3>Total de tareas</h3>
                <span id="totalTasks">0</span>
            </div>

            <div class="card">
                <h3>Pendientes</h3>
                <span id="pendingTasks">0</span>
            </div>

            <div class="card">
                <h3>Completadas</h3>
                <span id="completedTasks">0</span>
            </div>

        </section>

        <section class="actions">

            <a href="tareas.html" class="btn">
                <i class="fa-solid fa-list-check"></i>
                Gestionar Tareas
            </a>

        </section>

    </main>

    <script src="js/dashboard.js"></script>

</body>

</html>
