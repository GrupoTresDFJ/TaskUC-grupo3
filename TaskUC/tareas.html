<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskUC - Tareas</title>

    <link rel="stylesheet" href="css/tareas.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>

    <h1>
        <i class="fa-solid fa-list-check"></i>
        Gestión de Tareas
    </h1>

    <a href="dashboard.html" class="volver">
        Atrás
    </a>

</header>

<main>

    <section class="form-card">

        <h2>Nueva Tarea</h2>

        <form id="taskForm">

            <input
            type="text"
            id="taskName"
            placeholder="Nombre de la tarea"
            required>

            <select id="course">

                <option>Matemática Básica</option>
                <option>Introducción</option>
                <option>Comprensión de textos</option>
                <option>Liderazgo</option>
                <option>otros</option>

            </select>

            <select id="priority">

                <option>Alta</option>
                <option>Media</option>
                <option>Baja</option>

            </select>

            <input
            type="date"
            id="deadline"
            required>

            <button type="submit">
                Agregar
            </button>

        </form>

    </section>

    <section>

        <h2>Mis Tareas</h2>

        <div id="taskContainer"></div>

    </section>

</main>

<script src="js/tareas.js"></script>

</body>

</html>
